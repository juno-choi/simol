version: '3'

networks:
  proxy:
    name: proxy

services:
  traefik:
    image: traefik:v2.9
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
    labels: 
      - "traefik.enable=true"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy    
      
  back:
    image: juno941030/simol-back:1.0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.simol-back.rule=PathPrefix(`/api`)"
    environment:
      - TZ=Asia/Seoul
    networks:
      - proxy
